name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        if: ${{ hashFiles('package.json') != '' }}
        run: npm ci

      - name: Lint (Node)
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run lint --if-present

      - name: Test (Node)
        if: ${{ hashFiles('package.json') != '' }}
        run: npm test --if-present

      - name: Setup Python
        if: ${{ hashFiles('pyproject.toml', 'requirements.txt', 'requirements-dev.txt') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        if: ${{ hashFiles('requirements.txt', 'requirements-dev.txt') != '' }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Lint (Python)
        if: ${{ hashFiles('pyproject.toml') != '' }}
        run: |
          if python -m pip show ruff >/dev/null 2>&1; then
            ruff check .
          else
            echo "No Python linter configured; skipping."
          fi

      - name: Test (Python)
        if: ${{ hashFiles('pyproject.toml', 'requirements.txt', 'requirements-dev.txt') != '' }}
        run: |
          if python -m pip show pytest >/dev/null 2>&1; then
            pytest
          else
            echo "No pytest configured; skipping."
          fi
