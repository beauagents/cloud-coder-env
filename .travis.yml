language: minimal

jobs:
  include:
    - name: "Node.js checks"
      language: node_js
      node_js: "20"
      if: type = push OR type = pull_request
      script:
        - if [ -f package.json ]; then npm ci && npm run lint --if-present && npm test --if-present; else echo "No Node project detected"; fi

    - name: "Python checks"
      language: python
      python: "3.12"
      if: type = push OR type = pull_request
      script:
        - |
          if [ -f pyproject.toml ] || [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            [ -f requirements.txt ] && pip install -r requirements.txt || true
            [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt || true
            if python -m pip show ruff >/dev/null 2>&1; then ruff check .; else echo "No Python linter configured"; fi
            if python -m pip show pytest >/dev/null 2>&1; then pytest; else echo "No pytest configured"; fi
          else
            echo "No Python project detected"
          fi
